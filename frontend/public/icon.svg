<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC143C"/>
      <stop offset="100%" stop-color="#A0102E"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003893"/>
      <stop offset="100%" stop-color="#002766"/>
    </linearGradient>
  </defs>
  <!-- Ballot box body -->
  <rect x="80" y="200" width="352" height="250" rx="24" fill="url(#boxGrad)" stroke="#fff" stroke-width="8"/>
  <!-- Ballot slot -->
  <rect x="176" y="216" width="160" height="16" rx="8" fill="#0f172a" opacity="0.8"/>
  <!-- Lid -->
  <rect x="64" y="168" width="384" height="56" rx="16" fill="url(#lidGrad)" stroke="#fff" stroke-width="8"/>
  <!-- Ballot paper going into slot -->
  <rect x="206" y="80" width="100" height="148" rx="6" fill="#fff" opacity="0.95"/>
  <!-- Checkmark on ballot -->
  <polyline points="224,148 248,172 282,120" fill="none" stroke="#DC143C" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small Nepal-flag-inspired accent: triangle notch on right side of box -->
  <polygon points="432,280 432,380 380,330" fill="#003893" opacity="0.5"/>
</svg>
